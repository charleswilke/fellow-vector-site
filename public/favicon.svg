<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#08090f"/>

  <!-- Waveform trace -->
  <polyline
    points="2,16 5,16 7,10 9,22 11,8 13,24 15,14 17,18 19,11 21,21 23,16 26,16"
    fill="none"
    stroke="#00ff88"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
</svg>
